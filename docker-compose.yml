version: "3.9"

services:
  app:
    build: .
    container_name: backend-iii-app
    ports:
      - "3000:3000"
    environment:
      PORT: 3000
      MONGO_URL: mongodb://mongo:27017/backend3
      SESSION_STORE: mongo
      SESSION_SECRET: unSecretoSuperSeguro123
      SESSION_TTLSECONDS: 1800
      COOKIE_SECURE: false
    depends_on:
      - mongo

  mongo:
    image: mongo:7
    container_name: backend-iii-mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

volumes:
  mongo_data: